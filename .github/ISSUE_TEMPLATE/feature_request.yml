name: Feature Request
description: Suggest a new feature or enhancement
labels: ["type:feature"]
body:
  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which app does this affect?
      options:
        - Backend
        - Platform
        - Tutors
        - Parent
        - Multiple / Cross-app
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Need
      description: What problem does this solve? Why is it needed?
      placeholder: As a [role], I need [capability] so that [benefit]...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
      placeholder: Describe the desired behavior...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
    validations:
      required: false
