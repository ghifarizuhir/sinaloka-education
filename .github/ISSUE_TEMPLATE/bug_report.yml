name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which app is affected?
      options:
        - Backend
        - Platform
        - Tutors
        - Parent
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        ...

        **Expected behavior:**
        ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, logs, browser info, etc.
      placeholder: Any additional context...
    validations:
      required: false
