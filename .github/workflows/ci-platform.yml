name: CI — Platform

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-platform/**'
      - '.github/workflows/ci-platform.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'sinaloka-platform/**'
      - '.github/workflows/ci-platform.yml'

defaults:
  run:
    working-directory: sinaloka-platform

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-platform/package-lock.json

      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-platform/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-dist
          path: sinaloka-platform/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-platform/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          VITE_API_URL: http://localhost:5000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-e2e-results
          path: sinaloka-platform/e2e/test-results/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-platform/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high || true
