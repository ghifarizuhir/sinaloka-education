name: Deploy — Frontend

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-platform/**'
      - 'sinaloka-tutors/**'
      - 'sinaloka-parent/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to deploy'
        required: true
        type: choice
        options:
          - platform
          - tutors
          - parent
          - all
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.changes.outputs.platform }}
      tutors: ${{ steps.changes.outputs.tutors }}
      parent: ${{ steps.changes.outputs.parent }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            platform:
              - 'sinaloka-platform/**'
            tutors:
              - 'sinaloka-tutors/**'
            parent:
              - 'sinaloka-parent/**'

  deploy-platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.platform == 'true' ||
      github.event.inputs.app == 'platform' ||
      github.event.inputs.app == 'all'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.PLATFORM_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-platform/package-lock.json

      - run: npm ci
        working-directory: sinaloka-platform

      - run: npm run build
        working-directory: sinaloka-platform
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      # -------------------------------------------------------
      # Replace with your hosting deployment (Vercel, Netlify, S3, etc.)
      # -------------------------------------------------------
      - name: Deploy platform
        run: echo "🚀 Deploy platform to ${{ github.event.inputs.environment || 'staging' }}"

  deploy-tutors:
    name: Deploy Tutors
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.tutors == 'true' ||
      github.event.inputs.app == 'tutors' ||
      github.event.inputs.app == 'all'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.TUTORS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-tutors/package-lock.json

      - run: npm ci
        working-directory: sinaloka-tutors

      - run: npm run build
        working-directory: sinaloka-tutors
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Deploy tutors
        run: echo "🚀 Deploy tutors to ${{ github.event.inputs.environment || 'staging' }}"

  deploy-parent:
    name: Deploy Parent
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.parent == 'true' ||
      github.event.inputs.app == 'parent' ||
      github.event.inputs.app == 'all'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.PARENT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-parent/package-lock.json

      - run: npm ci
        working-directory: sinaloka-parent

      - run: npm run build
        working-directory: sinaloka-parent
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Deploy parent
        run: echo "🚀 Deploy parent to ${{ github.event.inputs.environment || 'staging' }}"
