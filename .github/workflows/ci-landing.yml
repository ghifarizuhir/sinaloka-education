name: CI — Landing

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-landing/**'
      - '.github/workflows/ci-landing.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'sinaloka-landing/**'
      - '.github/workflows/ci-landing.yml'

defaults:
  run:
    working-directory: sinaloka-landing

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-landing/package-lock.json

      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-landing/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-landing/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high || true
