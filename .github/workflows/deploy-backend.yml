name: Deploy — Backend

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci-backend.yml

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ vars.BACKEND_STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------
      # Replace this section with your actual deployment steps.
      # Examples: SSH + rsync, Docker build & push, AWS ECS, etc.
      # -------------------------------------------------------
      - name: Deploy to staging
        run: |
          echo "🚀 Deploy backend to staging"
          echo "Add your deployment commands here"
          # Example: ssh deploy@staging "cd /app && git pull && npm ci && npm run build && pm2 restart api"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.BACKEND_PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploy backend to production"
          echo "Add your deployment commands here"
