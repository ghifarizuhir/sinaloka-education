name: CI — Backend

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'sinaloka-backend/**'
      - '.github/workflows/ci-backend.yml'

defaults:
  run:
    working-directory: sinaloka-backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sinaloka_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-backend/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sinaloka_test

      - run: npm run test -- --ci --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sinaloka_test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: sinaloka-backend/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-backend/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-backend/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high || true
