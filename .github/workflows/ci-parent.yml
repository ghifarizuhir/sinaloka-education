name: CI — Parent

on:
  push:
    branches: [master, main]
    paths:
      - 'sinaloka-parent/**'
      - '.github/workflows/ci-parent.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'sinaloka-parent/**'
      - '.github/workflows/ci-parent.yml'

defaults:
  run:
    working-directory: sinaloka-parent

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-parent/package-lock.json

      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-parent/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parent-dist
          path: sinaloka-parent/dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinaloka-parent/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high || true
