[build]
buildCommand = "npm run prisma:generate && npm run build"

[deploy]
startCommand = "npx prisma migrate resolve --applied 20260318032839_add_subject_table_and_relations && npx prisma migrate deploy && npm run start:prod"
healthcheckPath = "/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
